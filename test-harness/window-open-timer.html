<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>popunder timer trap</title>
  </head>
  <body style="margin: 0; font-family: system-ui; padding: 40px">
    <p>This page tries to open a popunder on a timer with no user gesture. Layer 1 should block it.</p>
    <script>
      setTimeout(() => {
        const w = window.open('https://random-popunder.example/landing', '_blank');
        if (w) document.title = 'opened';
      }, 200);
    </script>
  </body>
</html>
